openapi: 3.0.3
info:
  title: SNSGod Oracle Message Service API
  version: 0.1.0
  description: 개인용 SNSGod Android 앱의 기기 등록, 상태 bootstrap, 메시지 접수와 증분 동기화 API입니다.
servers:
  - url: http://127.0.0.1:8787
    description: Oracle 호스트 내부 서비스
  - url: http://168.110.122.66/snsgod-message
    description: 현재 개인용 Nginx 프록시
tags:
  - name: Health
  - name: Devices
  - name: Sync
  - name: Messages
paths:
  /health:
    get:
      tags: [Health]
      summary: 서비스 상태 확인
      description: 작업 수, 메시지 수, FCM 제공자와 텍스트 API 상태를 반환합니다.
      responses:
        '200':
          description: 정상 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                ok: true
                serverTime: 1783809337039
                jobs: { pending: 6, failed: 0 }
                messages: 286
                devices: 3
                pushProvider: fcm
  /v1/device/register:
    post:
      tags: [Devices]
      summary: Android 기기 등록
      description: bootstrap secret을 검증하고 이후 요청에 사용할 기기 토큰을 발급합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistrationRequest'
            example:
              deviceId: oracle_device_example
              deviceName: SNSGod Android
              bootstrapSecret: pairing-secret
              pushToken: fcm-registration-token
      responses:
        '201':
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegistrationResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/sync/bootstrap:
    post:
      tags: [Sync]
      summary: 앱 상태와 알림 표시 설정 동기화
      description: 캐릭터, 방, 최근 메시지, 암호화된 텍스트 생성 설정과 현재 기기의 종류별 시스템 알림 표시 설정을 저장합니다. 종류별 알림을 꺼도 메시지 생성과 증분 동기화는 중단하지 않습니다.
      security:
        - deviceId: []
          deviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapRequest'
            example:
              pushToken: fcm-registration-token
              pushPreferences: { replies: true, proactive: false }
              characters:
                - id: character_mika
                  name: 미카
                  notificationImage: file:///data/user/0/com.snsgod.rn/files/snsgod-media/mika.png
              rooms:
                - id: room_mika
                  type: direct
                  name: 미카
                  characterId: character_mika
                  automation: { replyEnabled: true, proactiveEnabled: true }
              messages: []
      responses:
        '200':
          description: bootstrap 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '426':
          description: 암호화되지 않은 API credential이 HTTPS 없이 전달됨
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/messages:
    post:
      tags: [Messages]
      summary: 사용자 메시지 접수
      description: 사용자 메시지를 중복 없이 저장하고 현재 방의 답장 작업을 예약합니다.
      security:
        - deviceId: []
          deviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientMessage'
            example:
              id: msg_example
              clientMessageId: msg_example
              roomId: room_mika
              content: 안녕
              createdAt: 1783809071247
      responses:
        '202':
          description: 메시지 접수 또는 기존 메시지 중복 확인
          content:
            application/json:
              schema:
                type: object
                required: [accepted]
                properties:
                  accepted: { type: boolean }
                  duplicate: { type: boolean }
                  jobId: { type: string }
                  message: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: 해당 방의 답장 자동화가 비활성화됨
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/sync/changes:
    get:
      tags: [Sync]
      summary: 서버 생성 메시지 증분 동기화
      description: 지정 cursor 이후 서버에서 생성된 메시지와 새 cursor를 반환합니다.
      security:
        - deviceId: []
          deviceToken: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          example: 44
      responses:
        '200':
          description: 증분 메시지 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'
              example:
                cursor: 46
                messages:
                  - id: srvmsg_example
                    roomId: room_mika
                    role: character
                    characterId: character_mika
                    content: 응, 안녕.
                    createdAt: 1783809167640
                    sourceMode: server_reply
                serverTime: 1783809178656
        '401': { $ref: '#/components/responses/Unauthorized' }
components:
  securitySchemes:
    deviceId:
      type: apiKey
      in: header
      name: x-device-id
    deviceToken:
      type: apiKey
      in: header
      name: x-device-token
  responses:
    BadRequest:
      description: 요청 형식 오류
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: Invalid request }
    Unauthorized:
      description: 기기 인증 오류
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: Device authentication is required }
    Forbidden:
      description: bootstrap secret 불일치
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: Invalid bootstrap secret }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    DeviceRegistrationRequest:
      type: object
      required: [deviceId, bootstrapSecret]
      properties:
        deviceId: { type: string, maxLength: 180 }
        deviceName: { type: string, maxLength: 180, default: SNSGod Android }
        bootstrapSecret: { type: string, writeOnly: true }
        pushToken: { type: string, nullable: true, writeOnly: true }
    DeviceRegistrationResponse:
      type: object
      required: [deviceId, deviceToken, serverTime]
      properties:
        deviceId: { type: string }
        deviceToken: { type: string, writeOnly: true }
        serverTime: { type: integer, format: int64 }
    PushPreferences:
      type: object
      description: 현재 기기의 Android 시스템 알림 표시 정책입니다. 누락된 값은 true입니다.
      properties:
        replies: { type: boolean, default: true }
        proactive: { type: boolean, default: true }
    Character:
      type: object
      required: [id, name]
      additionalProperties: true
      properties:
        id: { type: string, maxLength: 120 }
        name: { type: string, maxLength: 120 }
        notificationImage:
          type: string
          maxLength: 4096
          description: 같은 개인용 Android 기기가 읽을 수 있는 file URL 또는 내려받을 수 있는 HTTP(S) URL입니다.
    Room:
      type: object
      required: [id, type, name]
      additionalProperties: true
      properties:
        id: { type: string, maxLength: 120 }
        type: { type: string, enum: [direct, group] }
        name: { type: string, maxLength: 160 }
        characterId: { type: string }
        participantIds: { type: array, items: { type: string } }
        automation: { type: object, additionalProperties: true }
    ClientMessage:
      type: object
      required: [id, roomId, content]
      properties:
        id: { type: string, maxLength: 180 }
        clientMessageId: { type: string, maxLength: 180 }
        roomId: { type: string, maxLength: 120 }
        content: { type: string }
        createdAt: { type: integer, format: int64 }
        metadata: { type: object, additionalProperties: true }
    BootstrapRequest:
      type: object
      properties:
        pushToken: { type: string, nullable: true, writeOnly: true }
        pushPreferences: { $ref: '#/components/schemas/PushPreferences' }
        characters: { type: array, maxItems: 200, items: { $ref: '#/components/schemas/Character' } }
        rooms: { type: array, maxItems: 500, items: { $ref: '#/components/schemas/Room' } }
        messages: { type: array, maxItems: 300, items: { $ref: '#/components/schemas/ClientMessage' } }
        textGenerationEnvelope: { type: object, writeOnly: true, additionalProperties: true }
    BootstrapResponse:
      type: object
      required: [accepted, serverTime, cursor, textGeneration]
      properties:
        accepted: { type: boolean }
        serverTime: { type: integer, format: int64 }
        cursor: { type: integer, minimum: 0 }
        textGeneration: { type: object, additionalProperties: true }
    Message:
      type: object
      required: [id, roomId, role, content, createdAt]
      additionalProperties: true
      properties:
        id: { type: string }
        roomId: { type: string }
        role: { type: string, enum: [user, character, system] }
        characterId: { type: string }
        content: { type: string }
        createdAt: { type: integer, format: int64 }
        serverCreatedAt: { type: integer, format: int64 }
        sourceMode: { type: string }
    SyncResponse:
      type: object
      required: [cursor, messages, serverTime]
      properties:
        cursor: { type: integer, minimum: 0 }
        messages: { type: array, items: { $ref: '#/components/schemas/Message' } }
        serverTime: { type: integer, format: int64 }
    HealthResponse:
      type: object
      required: [ok, serverTime, jobs, messages, devices, pushProvider]
      additionalProperties: true
      properties:
        ok: { type: boolean }
        serverTime: { type: integer, format: int64 }
        jobs:
          type: object
          required: [pending, failed]
          properties:
            pending: { type: integer, minimum: 0 }
            failed: { type: integer, minimum: 0 }
        messages: { type: integer, minimum: 0 }
        devices: { type: integer, minimum: 0 }
        pushProvider: { type: string }
