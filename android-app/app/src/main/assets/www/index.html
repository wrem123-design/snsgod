<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050b16">
    <title>SNSGod</title>
    <link rel="stylesheet" href="standalone-mobile.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #050b16;
            overscroll-behavior: none;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .standalone-boot {
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #fff;
            background: radial-gradient(circle at 20% 10%, #37556f 0, transparent 36%),
                radial-gradient(circle at 76% 16%, #603447 0, transparent 34%),
                #050b16;
        }
        .standalone-boot strong {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="standalone-boot"><strong>SNSGod 시작 중...</strong></div>

</html>
